name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ──────────────────────────────────────────────────────────────
  # LINT: formatting + clippy
  # ──────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy (zero warnings)
        run: cargo clippy -- -D warnings

  # ──────────────────────────────────────────────────────────────
  # TEST: unit tests on stable + nightly
  # ──────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain: [stable, nightly]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (${{ matrix.toolchain }})
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.toolchain }}

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --verbose

      - name: Run tests (release)
        run: cargo test --release --verbose

  # ──────────────────────────────────────────────────────────────
  # BUILD: release binaries for linux-amd64 + linux-arm64
  # ──────────────────────────────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: watt-sampler-linux-amd64
          - target: aarch64-unknown-linux-gnu
            artifact: watt-sampler-linux-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/watt-sampler ${{ matrix.artifact }}

      - name: Compute SHA256
        run: sha256sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.sha256

      - name: Verify binary size (< 10MB)
        run: |
          SIZE=$(stat -c%s ${{ matrix.artifact }})
          echo "Binary size: ${SIZE} bytes ($(($SIZE / 1024 / 1024))MB)"
          if [ "$SIZE" -gt 10485760 ]; then
            echo "::error::Binary exceeds 10MB limit"
            exit 1
          fi

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256

  # ──────────────────────────────────────────────────────────────
  # CLI: verify all commands produce correct output
  #
  # Note: watt-sampler sends child process output to stderr and
  # JSON to stdout. Use `2>/dev/null` when capturing JSON so
  # child output doesn't pollute the captured variable.
  # ──────────────────────────────────────────────────────────────
  cli:
    name: CLI Verification
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cargo build --release

      # ── check-hardware ────────────────────────────────────────
      # Exit codes: 0 = RAPL available, 2 = estimated (no RAPL — expected on GitHub runners)
      - name: check-hardware produces valid JSON
        run: |
          set +e
          JSON=$(./target/release/watt-sampler check-hardware 2>/dev/null)
          EXIT_CODE=$?
          set -e

          echo "$JSON"
          echo "Exit code: $EXIT_CODE"

          # Accept 0 (RAPL found) or 2 (estimated — normal on GitHub runners)
          if [ "$EXIT_CODE" -ne 0 ] && [ "$EXIT_CODE" -ne 2 ]; then
            echo "::error::check-hardware exited with unexpected code $EXIT_CODE"
            exit 1
          fi

          # Verify it's valid JSON
          echo "$JSON" | jq -e '.rapl_method' > /dev/null
          echo "$JSON" | jq -e '.rapl_domains' > /dev/null
          echo "$JSON" | jq -e '.gpu' > /dev/null
          echo "$JSON" | jq -e '.estimated' > /dev/null

          echo "check-hardware output schema OK"

      # ── run command ───────────────────────────────────────────
      # Child output goes to stderr (visible in CI logs), JSON stays clean on stdout
      - name: run produces valid JSON
        run: |
          set +e
          JSON=$(./target/release/watt-sampler run --iterations 3 --warmup 1 -- echo hello 2>/dev/null)
          EXIT_CODE=$?
          set -e

          echo "$JSON"

          # Exit 0 (valid) or 1 (noise too high — acceptable in CI)
          if [ "$EXIT_CODE" -ne 0 ] && [ "$EXIT_CODE" -ne 1 ]; then
            echo "::error::run exited with unexpected code $EXIT_CODE"
            exit 1
          fi

          # Verify it's valid JSON
          echo "$JSON" | jq -e '.schema_version' > /dev/null

          # Verify schema_version
          SCHEMA=$(echo "$JSON" | jq -r '.schema_version')
          if [ "$SCHEMA" != "1" ]; then
            echo "::error::schema_version should be '1', got '$SCHEMA'"
            exit 1
          fi

          # Verify required top-level fields
          echo "$JSON" | jq -e '.timestamp_utc' > /dev/null
          echo "$JSON" | jq -e '.host' > /dev/null
          echo "$JSON" | jq -e '.benchmark' > /dev/null
          echo "$JSON" | jq -e '.measurements' > /dev/null
          echo "$JSON" | jq -e '.summary' > /dev/null

          # Verify host fields
          echo "$JSON" | jq -e '.host.cpu_vendor' > /dev/null
          echo "$JSON" | jq -e '.host.cpu_model' > /dev/null
          echo "$JSON" | jq -e '.host.rapl_method' > /dev/null

          # Verify benchmark fields
          CMD=$(echo "$JSON" | jq -r '.benchmark.command')
          if [ "$CMD" != "echo hello" ]; then
            echo "::error::benchmark.command should be 'echo hello', got '$CMD'"
            exit 1
          fi

          ITERS=$(echo "$JSON" | jq -r '.benchmark.iterations_requested')
          if [ "$ITERS" != "3" ]; then
            echo "::error::iterations_requested should be 3, got $ITERS"
            exit 1
          fi

          WARMUP=$(echo "$JSON" | jq -r '.benchmark.warmup_iters')
          if [ "$WARMUP" != "1" ]; then
            echo "::error::warmup_iters should be 1, got $WARMUP"
            exit 1
          fi

          # Verify measurements count matches iterations
          MEAS_COUNT=$(echo "$JSON" | jq '.measurements | length')
          if [ "$MEAS_COUNT" != "3" ]; then
            echo "::error::Expected 3 measurements, got $MEAS_COUNT"
            exit 1
          fi

          # Verify each measurement has required fields
          for i in $(seq 0 2); do
            echo "$JSON" | jq -e ".measurements[$i].iteration" > /dev/null
            echo "$JSON" | jq -e ".measurements[$i].duration_s" > /dev/null
            echo "$JSON" | jq -e ".measurements[$i].energy" > /dev/null
            echo "$JSON" | jq -e ".measurements[$i].power" > /dev/null
            echo "$JSON" | jq -e ".measurements[$i].energy.total_joules" > /dev/null
          done

          # Verify summary fields
          echo "$JSON" | jq -e '.summary.median_total_joules' > /dev/null
          echo "$JSON" | jq -e '.summary.p5_total_joules' > /dev/null
          echo "$JSON" | jq -e '.summary.p95_total_joules' > /dev/null
          echo "$JSON" | jq -e '.summary.noise_pct' > /dev/null
          echo "$JSON" | jq -e '.summary.valid' > /dev/null
          echo "$JSON" | jq -e '.summary.warnings' > /dev/null

          # Verify noise_pct is a number between 0 and 100
          NOISE=$(echo "$JSON" | jq -r '.summary.noise_pct')
          if awk "BEGIN {exit !($NOISE < 0 || $NOISE > 100)}"; then
            echo "::error::noise_pct $NOISE not in range 0-100"
            exit 1
          fi

          echo "run output schema OK"

      # ── human output ─────────────────────────────────────────
      - name: run with human output
        run: |
          set +e
          HUMAN=$(./target/release/watt-sampler run --output human --iterations 2 --warmup 0 -- echo hello 2>/dev/null)
          set -e

          echo "$HUMAN"
          echo "$HUMAN" | grep -q "WattLint"
          echo "Human output OK"

      # ── iteration counting ────────────────────────────────────
      - name: run respects --iterations and --warmup
        run: |
          set +e
          JSON=$(./target/release/watt-sampler run --iterations 3 --warmup 5 -- echo tick 2>/dev/null)
          set -e

          # Verify JSON says 3 iterations
          ITERS=$(echo "$JSON" | jq -r '.benchmark.iterations_requested')
          if [ "$ITERS" != "3" ]; then
            echo "::error::Expected 3 iterations, got $ITERS"
            exit 1
          fi
          echo "Iteration counting OK"

      # ── diff command ─────────────────────────────────────────
      - name: diff compares two JSON files
        run: |
          set +e
          ./target/release/watt-sampler run --iterations 3 --warmup 0 -- echo a 2>/dev/null > /tmp/baseline.json
          ./target/release/watt-sampler run --iterations 3 --warmup 0 -- echo b 2>/dev/null > /tmp/current.json
          set -e

          # Test human output
          DIFF_OUT=$(./target/release/watt-sampler diff --baseline /tmp/baseline.json --current /tmp/current.json 2>&1)
          echo "$DIFF_OUT"
          echo "$DIFF_OUT" | grep -q "WattLint"

          # Test JSON output
          DIFF_JSON=$(./target/release/watt-sampler diff --baseline /tmp/baseline.json --current /tmp/current.json --output json 2>&1)
          echo "$DIFF_JSON" | jq -e '.baseline_joules' > /dev/null
          echo "$DIFF_JSON" | jq -e '.current_joules' > /dev/null
          echo "$DIFF_JSON" | jq -e '.delta_pct' > /dev/null
          echo "$DIFF_JSON" | jq -e '.regression' > /dev/null

          # Test markdown output
          DIFF_MD=$(./target/release/watt-sampler diff --baseline /tmp/baseline.json --current /tmp/current.json --output markdown 2>&1)
          echo "$DIFF_MD" | grep -q "wattlint-report"

          echo "diff output OK"

      # ── diff --fail ──────────────────────────────────────────
      - name: diff --fail exits correctly
        run: |
          set +e
          ./target/release/watt-sampler run --iterations 3 --warmup 0 -- echo a 2>/dev/null > /tmp/baseline.json
          ./target/release/watt-sampler run --iterations 3 --warmup 0 -- echo b 2>/dev/null > /tmp/current.json
          set -e

          # --threshold 0 --fail: any delta triggers exit 1
          # On GitHub runners with 0J readings, both exit 0 and 1 are valid
          set +e
          ./target/release/watt-sampler diff --baseline /tmp/baseline.json --current /tmp/current.json --threshold 0 --fail
          DIFF_EXIT=$?
          set -e

          if [ "$DIFF_EXIT" -ne 0 ] && [ "$DIFF_EXIT" -ne 1 ]; then
            echo "::error::diff --fail exited with unexpected code $DIFF_EXIT"
            exit 1
          fi
          echo "diff --fail exit code: $DIFF_EXIT (OK)"

      # ── stdout contains only JSON ─────────────────────────────
      - name: stdout contains only JSON
        run: |
          set +e
          JSON=$(./target/release/watt-sampler run --iterations 2 --warmup 0 -- echo test 2>/dev/null)
          set -e

          # Must be valid JSON (no child output mixed in)
          echo "$JSON" | jq -e '.schema_version' > /dev/null

          # Should NOT contain non-JSON text
          if echo "$JSON" | grep -qi "test\|hello\|warning\|error"; then
            echo "::error::stdout contains non-JSON text: $JSON"
            exit 1
          fi

          echo "stdout/stderr separation OK"

  # ──────────────────────────────────────────────────────────────
  # VALIDATE: cross-check binary properties
  # ──────────────────────────────────────────────────────────────
  validate:
    name: Validate Binary
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download linux-amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: watt-sampler-linux-amd64

      - name: Verify SHA256
        run: sha256sum -c watt-sampler-linux-amd64.sha256

      - name: Verify binary is executable
        run: |
          chmod +x watt-sampler-linux-amd64
          ./watt-sampler-linux-amd64 --version

      # check-hardware returns 0 (RAPL found) or 2 (estimated — normal on GitHub runners)
      - name: Verify binary runs on this runner
        run: |
          set +e
          JSON=$(./watt-sampler-linux-amd64 check-hardware 2>/dev/null)
          EXIT_CODE=$?
          set -e

          echo "$JSON"
          echo "Exit code: $EXIT_CODE"

          if [ "$EXIT_CODE" -ne 0 ] && [ "$EXIT_CODE" -ne 2 ]; then
            echo "::error::check-hardware exited with unexpected code $EXIT_CODE"
            exit 1
          fi

          echo "$JSON" | jq -e '.rapl_method' > /dev/null
          echo "Binary validation OK"

  # ──────────────────────────────────────────────────────────────
  # RAPL: test on self-hosted runner with real RAPL
  # Requires a self-hosted runner with labels [self-hosted, linux, x64]
